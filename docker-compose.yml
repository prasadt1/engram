services:
  engram:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - engram
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
