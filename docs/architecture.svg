<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#8a7a66" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1600" height="1000" fill="#faf8f4"/>
  <text x="48" y="52" font-size="26" font-weight="bold" fill="#2a2520">Engram — architecture</text>
  <text x="48" y="78" font-size="14" fill="#6b6157">A forgetting-aware memory coach on Qwen Cloud · Global AI Hackathon, Track 1: MemoryAgent</text>

  <!-- Browser -->
  <rect x="48" y="130" width="300" height="150" rx="10" fill="#ffffff" stroke="#c9beb2" stroke-width="1.5"/>
  <text x="68" y="160" font-size="16" font-weight="bold" fill="#2a2520">Browser — React 19 SPA</text>
  <text x="68" y="186" font-size="13" fill="#4a4238">Journey · My Work · Mentor · Glass box</text>
  <text x="68" y="208" font-size="13" fill="#4a4238">Memory Receipt on every reply</text>
  <text x="68" y="230" font-size="13" fill="#4a4238">Photo split view + scoped chat</text>
  <text x="68" y="256" font-size="12.5" fill="#b45309" font-weight="bold">Judge mode: /?judge=1</text>

  <!-- Browser -> FastAPI -->
  <line x1="348" y1="205" x2="428" y2="205" stroke="#8a7a66" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="360" y="194" font-size="11.5" fill="#6b6157">JSON</text>

  <!-- Alibaba Cloud boundary -->
  <rect x="432" y="104" width="736" height="760" rx="14" fill="none" stroke="#b45309" stroke-width="1.8" stroke-dasharray="8 6"/>
  <text x="452" y="132" font-size="15" font-weight="bold" fill="#b45309">Alibaba Cloud — ECS / SAS, Singapore (Docker)</text>

  <!-- FastAPI -->
  <rect x="456" y="148" width="688" height="104" rx="10" fill="#ffffff" stroke="#c9beb2" stroke-width="1.5"/>
  <text x="476" y="176" font-size="16" font-weight="bold" fill="#2a2520">FastAPI backend</text>
  <text x="476" y="200" font-size="12.5" fill="#4a4238">analyze-photo (save-before-analyze, 20 MB cap) · agent/chat (sessionId · persona · photo_id) · journey</text>
  <text x="476" y="220" font-size="12.5" fill="#4a4238">portfolio + stats + trends · memory-stats (?via=mcp) · users/me · friendly 502/503 error mapping</text>
  <text x="476" y="240" font-size="12.5" fill="#4a4238">startup: fail-fast Mongo ping + user_id indexes</text>

  <!-- Specialists -->
  <rect x="456" y="278" width="216" height="118" rx="10" fill="#fdf3e4" stroke="#d9a45b" stroke-width="1.5"/>
  <text x="472" y="304" font-size="14.5" font-weight="bold" fill="#2a2520">Coach (vision)</text>
  <text x="472" y="326" font-size="12" fill="#4a4238">qwen-vl-max critique</text>
  <text x="472" y="344" font-size="12" fill="#4a4238">genre tagging · glass box</text>
  <text x="472" y="362" font-size="12" fill="#4a4238">JSON shape-repair retry</text>
  <text x="472" y="380" font-size="12" fill="#4a4238">memory-aware context</text>

  <rect x="692" y="278" width="216" height="118" rx="10" fill="#fdf3e4" stroke="#d9a45b" stroke-width="1.5"/>
  <text x="708" y="304" font-size="14.5" font-weight="bold" fill="#2a2520">Mentor (chat)</text>
  <text x="708" y="326" font-size="12" fill="#4a4238">recall, retire, focus voice</text>
  <text x="708" y="344" font-size="12" fill="#4a4238">photo-scoped recall</text>
  <text x="708" y="362" font-size="12" fill="#4a4238">6-turn session window</text>
  <text x="708" y="380" font-size="12" fill="#4a4238">returns Memory Receipt</text>

  <rect x="928" y="278" width="216" height="118" rx="10" fill="#fdf3e4" stroke="#d9a45b" stroke-width="1.5"/>
  <text x="944" y="304" font-size="14.5" font-weight="bold" fill="#2a2520">Reflection</text>
  <text x="944" y="326" font-size="12" fill="#4a4238">one-line progress summary</text>
  <text x="944" y="344" font-size="12" fill="#4a4238">feeds the Journey page</text>
  <text x="944" y="362" font-size="12" fill="#4a4238">cheap tier (flash)</text>

  <!-- Memory engine -->
  <rect x="456" y="424" width="688" height="150" rx="10" fill="#f2ece3" stroke="#b45309" stroke-width="2"/>
  <text x="476" y="452" font-size="16" font-weight="bold" fill="#8a3e06">Memory engine + context builder</text>
  <text x="476" y="478" font-size="12.5" fill="#4a4238">recall_scored — salience = importance × recency × query-relevance (explainable per-item breakdown)</text>
  <text x="476" y="498" font-size="12.5" fill="#4a4238">graduation state machine — a watched skill clears after 3 consecutive above-bar sessions; coaching retires</text>
  <text x="476" y="518" font-size="12.5" fill="#4a4238">supersession — contradicted facts link superseded_by; excluded from recall (retirement, never deletion)</text>
  <text x="476" y="538" font-size="12.5" fill="#4a4238">token-budget packing — best memories fit a fixed budget; the rest is reported, not hidden</text>
  <text x="476" y="562" font-size="12.5" font-weight="bold" fill="#8a3e06">Memory Receipt: recalled · retired · dropped-by-budget, on every critique and chat reply</text>

  <!-- engram-mcp -->
  <rect x="456" y="602" width="420" height="112" rx="10" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
  <text x="476" y="630" font-size="15" font-weight="bold" fill="#8a3e06">engram-mcp — custom MCP server</text>
  <text x="476" y="654" font-size="12.5" fill="#4a4238">typed tools: recall · consolidate · forget · get_memory_stats</text>
  <text x="476" y="674" font-size="12.5" fill="#4a4238">stdio transport · any Qwen agent can mount it</text>
  <text x="476" y="694" font-size="12.5" fill="#4a4238">live paths: ?via=mcp route · committed protocol transcript</text>

  <!-- Storage -->
  <rect x="906" y="602" width="238" height="112" rx="10" fill="#ffffff" stroke="#c9beb2" stroke-width="1.5"/>
  <text x="926" y="630" font-size="15" font-weight="bold" fill="#2a2520">Photo storage</text>
  <text x="926" y="654" font-size="12.5" fill="#4a4238">Alibaba OSS (signed URLs)</text>
  <text x="926" y="674" font-size="12.5" fill="#4a4238">local-disk dev backend</text>
  <text x="926" y="694" font-size="12.5" fill="#4a4238">one env-var flip</text>

  <!-- Seed / demo -->
  <rect x="456" y="742" width="688" height="96" rx="10" fill="#ffffff" stroke="#c9beb2" stroke-width="1.5"/>
  <text x="476" y="770" font-size="15" font-weight="bold" fill="#2a2520">Seeded demo journey</text>
  <text x="476" y="794" font-size="12.5" fill="#4a4238">16 real Qwen-VL critiques · 5 backdated sessions · composition graduates on session 5</text>
  <text x="476" y="814" font-size="12.5" fill="#4a4238">supersession pairs power the receipt's Retired row · judge mode lands here</text>

  <!-- Qwen Cloud -->
  <rect x="1220" y="148" width="332" height="180" rx="10" fill="#eef3f8" stroke="#5b7fa6" stroke-width="2"/>
  <text x="1240" y="178" font-size="16" font-weight="bold" fill="#2c4a68">Qwen Cloud (DashScope)</text>
  <text x="1240" y="200" font-size="12.5" fill="#40566c">OpenAI-compatible · dashscope-intl</text>
  <rect x="1240" y="216" width="292" height="26" rx="13" fill="#ffffff" stroke="#9db4ca"/>
  <text x="1254" y="234" font-size="12.5" fill="#2c4a68">qwen-vl-max — vision critique + genre</text>
  <rect x="1240" y="250" width="292" height="26" rx="13" fill="#ffffff" stroke="#9db4ca"/>
  <text x="1254" y="268" font-size="12.5" fill="#2c4a68">qwen3.7-max — reasoning · shape repair</text>
  <rect x="1240" y="284" width="292" height="26" rx="13" fill="#ffffff" stroke="#9db4ca"/>
  <text x="1254" y="302" font-size="12.5" fill="#2c4a68">qwen3.6-flash — summaries · cheap ops</text>

  <!-- MongoDB -->
  <rect x="1220" y="392" width="332" height="150" rx="10" fill="#eef6ef" stroke="#5f8f68" stroke-width="2"/>
  <text x="1240" y="422" font-size="16" font-weight="bold" fill="#2e5637">MongoDB Atlas — the memory</text>
  <text x="1240" y="448" font-size="12.5" fill="#3f5c45">memory_items (salience metadata, supersession links)</text>
  <text x="1240" y="468" font-size="12.5" fill="#3f5c45">skills (graduation state, evidence)</text>
  <text x="1240" y="488" font-size="12.5" fill="#3f5c45">portfolio_entries · chat_turns · users</text>
  <text x="1240" y="514" font-size="12" fill="#6b6157">kept multi-cloud; backend runs on Alibaba</text>

  <!-- Eval -->
  <rect x="1220" y="606" width="332" height="168" rx="10" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
  <text x="1240" y="636" font-size="16" font-weight="bold" fill="#8a3e06">/eval — frozen benchmark</text>
  <text x="1240" y="662" font-size="12.5" fill="#4a4238">26 traces · adversarial + chains + multi-hop</text>
  <text x="1240" y="684" font-size="13" font-weight="bold" fill="#2a2520">FAMA 1.00 with forgetting vs 0.64 without</text>
  <text x="1240" y="704" font-size="13" font-weight="bold" fill="#2a2520">1.72× fewer context tokens · recall unchanged</text>
  <text x="1240" y="730" font-size="12" fill="#6b6157">deterministic · one command: eval.run --compare</text>
  <text x="1240" y="750" font-size="12" fill="#6b6157">λ disclosed · traces frozen pre-results</text>

  <!-- Arrows -->
  <line x1="800" y1="252" x2="800" y2="274" stroke="#8a7a66" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="564" y1="396" x2="564" y2="420" stroke="#8a7a66" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="800" y1="396" x2="800" y2="420" stroke="#8a7a66" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="1036" y1="396" x2="1036" y2="420" stroke="#8a7a66" stroke-width="1.6" marker-end="url(#arr)"/>

  <line x1="666" y1="602" x2="666" y2="578" stroke="#8a7a66" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="560" y="594" font-size="11.5" fill="#6b6157">mounts the engine</text>

  <!-- specialists -> qwen cloud -->
  <line x1="1148" y1="330" x2="1216" y2="270" stroke="#5b7fa6" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="1120" y="356" font-size="11.5" fill="#40566c">qwen_client — retries,</text>
  <text x="1120" y="372" font-size="11.5" fill="#40566c">JSON repair, cost log</text>

  <!-- memory engine -> mongo -->
  <line x1="1148" y1="482" x2="1216" y2="470" stroke="#5f8f68" stroke-width="1.8" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- eval -> memory engine (dashed) -->
  <line x1="1216" y1="672" x2="1150" y2="560" stroke="#b45309" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="1245" y="592" font-size="11.5" fill="#8a3e06">measures</text>

  <!-- fastapi -> storage -->
  <line x1="1025" y1="580" x2="1025" y2="598" stroke="#8a7a66" stroke-width="1.6" marker-end="url(#arr)"/>

  <text x="48" y="962" font-size="12" fill="#8a7a66">github.com/prasadt1/engram · Apache-2.0 · built on the author's open-source Iris foundation · every model call via Qwen Cloud's managed API</text>
</svg>
